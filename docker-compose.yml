version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: foodsafe
      POSTGRES_USER: foodsafe
      POSTGRES_PASSWORD: foodsafe_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodsafe"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://foodsafe:foodsafe_dev@db:5432/foodsafe
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:3000","http://frontend"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # Celery worker for async ML tasks
  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://foodsafe:foodsafe_dev@db:5432/foodsafe
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: celery -A tasks.celery_app worker --loglevel=info

volumes:
  pgdata:
